<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺中市建功國小行政值勤系統</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f4f7f6;
        }
        /* 容器設計 */
        .container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center;
        }
        /* 按鈕設計 */
        .login-btn {
            background-color: #4285f4; color: white; padding: 15px 30px;
            font-size: 1.2rem; text-decoration: none; border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s;
        }
        .login-btn:hover { background-color: #357ae8; transform: translateY(-2px); }
        
        iframe {
            width: 100%; height: 100vh; border: none; display: none; /* 預設先隱藏 */
        }
        
        .loading-text { color: #666; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="fallback" class="container">
        <h2 style="color: #333;">臺中市建功國小行政值勤系統</h2>
        <p class="loading-text">由於瀏覽器安全限制，若系統未自動出現，請點擊下方按鈕：</p>
        <a href="https://script.google.com/a/macros/mail.jkes.tc.edu.tw/s/AKfycbyil-_EmHsY910SN3kZNoJGpUk6_XJwDcNCFj2_MZ64hrm6eDRz2mp-igB6cSyBYru81g/exec" 
           target="_top" class="login-btn">
            🚀 點此登入並開啟系統
        </a>
    </div>

    <iframe id="systemFrame" src="https://script.google.com/a/macros/mail.jkes.tc.edu.tw/s/AKfycbyil-_EmHsY910SN3kZNoJGpUk6_XJwDcNCFj2_MZ64hrm6eDRz2mp-igB6cSyBYru81g/exec"></iframe>

    <script>
        // 嘗試偵測 iframe 是否載入成功 (這在跨網域時有精確度限制，但可作為輔助)
        var iframe = document.getElementById('systemFrame');
        var fallback = document.getElementById('fallback');

        // 監聽 iframe 載入事件
        iframe.onload = function() {
            // 如果成功載入，通常 fallback 就不需要那麼突兀
            // 但因為跨網域安全性，我們無法真正讀取內容，
            // 建議維持「按鈕」與「iframe」並存，或者引導使用者直接點擊。
            iframe.style.display = "block";
        };
    </script>
</body>
</html>
